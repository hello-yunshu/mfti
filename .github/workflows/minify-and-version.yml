name: Minify and Version Assets

on:
  push:
    branches: [ main, master ]
    paths:
      - '**.js'
      - '**.css'
      - '!node_modules/**'
      - '!**.min.js'
      - '!**.min.css'

  workflow_dispatch:
    inputs:
      force_regenerate_all:
        description: '强制重新生成所有 JS 和 CSS 文件的最小化版本'
        type: boolean
        default: true

permissions:
  contents: write
  actions: write

jobs:
  minify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@main
        with:
          fetch-depth: 2

      - name: Set up Node.js
        uses: actions/setup-node@main
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@main
        with:
          files: |
            **.js
            **.css
          files_ignore: |
            **.min.js
            **.min.css
            node_modules/**

      - name: Determine files to process
        id: determine-files
        run: |
          if [ "${{ inputs.force_regenerate_all }}" = "true" ]; then
            echo "Force regenerate all files"
            # Find all JS and CSS files (excluding min and node_modules)
            ALL_FILES=$(find . -type f \( -name "*.js" -o -name "*.css" \) -not -path "*/node_modules/*" -not -name "*.min.js" -not -name "*.min.css" | sed 's|^\./||' | tr '\n' ' ')
            echo "files=$ALL_FILES" >> $GITHUB_OUTPUT
            echo "has_files=true" >> $GITHUB_OUTPUT
          else
            echo "Processing changed files only"
            echo "files=${{ steps.changed-files.outputs.all_changed_files }}" >> $GITHUB_OUTPUT
            if [ "${{ steps.changed-files.outputs.any_changed }}" = "true" ]; then
              echo "has_files=true" >> $GITHUB_OUTPUT
            else
              echo "has_files=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Process files
        if: steps.determine-files.outputs.has_files == 'true'
        run: |
          echo "Files to process: ${{ steps.determine-files.outputs.files }}"
          node scripts/minify-and-version.js ${{ steps.determine-files.outputs.files }}

      - name: Commit and push changes
        if: steps.determine-files.outputs.has_files == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "chore: minify assets and update versions [skip ci]"
          git push

  cleanup-old-runs:
    runs-on: ubuntu-latest
    needs: minify
    if: always()
    steps:
      - name: Cleanup old workflow runs
        uses: Mattraks/delete-workflow-runs@main
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 7
          keep_minimum_runs: 5
